<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SR Lab</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #c { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; top: 8px; left: 8px; font: 12px monospace;
        color: #0f0; background: rgba(0,0,0,.5); padding: 4px 8px; white-space: pre;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="hud">press play</div>
    <div id="ui" style="position:fixed;bottom:8px;left:8px;font:12px monospace;color:#0f0">
      <button id="play" type="button">▶ play</button>
      <label><input id="authentic" type="checkbox" /> authentic</label>
      <label>A/V offset <input id="off" type="range" min="-0.2" max="0.2" step="0.005" value="0" /></label>
      <span id="offval">0ms</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
